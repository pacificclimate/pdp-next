name: Lint

on:
  push:
    branches: [main]
    paths:
      - 'viewer/js/**'
      - 'eslint.config.mjs'
      - 'package.json'
  pull_request:
    paths:
      - 'viewer/js/**'
      - 'eslint.config.mjs'
      - 'package.json'

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (errors fail, warnings annotate)
        run: npm run lint:ci